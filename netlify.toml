# Netlify deployment config for RumaRuma (Vite + React SPA)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps=false"

# SPA fallback — semua route diserahkan ke React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term cache untuk asset hashed (Vite menambahkan hash di filename)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers untuk semua response
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Deploy preview branch (opsional) — branch selain main = preview deploy
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
